global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fin-mate-nextjs'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/api/metrics'

  - job_name: 'fin-mate-ml-server'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'
