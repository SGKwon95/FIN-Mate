server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fin-mate-workers
    static_configs:
      - targets: [localhost]
        labels:
          job: fin-mate-workers
          __path__: /var/log/fin-mate/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            worker: worker
            event: event
            transactionNo: transactionNo
      - labels:
          level:
          worker:
          event:

  - job_name: fin-mate-nextjs
    static_configs:
      - targets: [localhost]
        labels:
          job: fin-mate-nextjs
          __path__: /var/log/fin-mate/nextjs.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
      - labels:
          level:
          event:
